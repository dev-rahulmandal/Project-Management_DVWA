# Prolane - the whole system in one command:  docker compose up --build
#
# DELIBERATELY-VULNERABLE training target. Ports publish to 127.0.0.1 ONLY, so
# nothing is reachable off this machine. Do not change that for a real network.
#
# Two distinct origins on purpose:
#   web  http://localhost:8082  (browser UI, session cookie)
#   api  http://localhost:8081  (Bearer-JWT service tier)
# Inside the compose network the web server reaches the api by service name
# (http://api:8081); the browser reaches the api via the published localhost port.

name: prolane

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: prolane-api
    container_name: prolane-api
    environment:
      DATABASE_PATH: vulnforge.db
      JWT_SECRET: summer2023
      JWT_ISSUER: prolane-api
      WEB_ORIGIN: http://localhost:8082
      VF_LAB: "1"
      VF_HARDENED: "0"
      PROLANE_RUNTIME: docker
    ports:
      - "127.0.0.1:8081:8081"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        # Inlined into the client bundle at build time (browser -> host api port).
        NEXT_PUBLIC_API_ORIGIN: http://localhost:8081
    image: prolane-web
    container_name: prolane-web
    environment:
      # Server-side, runtime: web -> api over the compose network.
      INTERNAL_API_ORIGIN: http://api:8081
      NEXT_PUBLIC_API_ORIGIN: http://localhost:8081
      WEB_ORIGIN: http://localhost:8082
      SESSION_SECRET: fake-session-secret-for-training-only
      JWT_SECRET: summer2023
      JWT_ISSUER: prolane-api
      VF_LAB: "1"
    ports:
      - "127.0.0.1:8082:8082"
    depends_on:
      api:
        condition: service_healthy
