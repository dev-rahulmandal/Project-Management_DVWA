# GitHub secret-scanning configuration.
#
# Prolane is a DELIBERATELY-VULNERABLE security-training application. Every
# credential in the paths below is a FAKE, inert training artifact planted on
# purpose as part of the vulnerability catalog (see SECURITY.md and
# ground-truth/manifest.yaml). They are realistic-looking by design - that IS the
# lesson (e.g. WEB-SECRET-001 "secret in the JS bundle", API-SSRF-001
# "SSRF to cloud metadata") - but none are real or usable.
#
# These paths are excluded from secret-scanning ALERTS so the dashboard is not
# flooded with false positives. Note: this does not disable push protection - if
# a push is ever blocked on one of these known fakes, allow it once via the
# unblock URL GitHub prints (it remembers the decision).
paths-ignore:
  - "web/app/pricing/page.tsx"
  - "api/detection/predicates.py"
  - "api/detection/middleware.py"
  - "api/routes/vulns/ssrf.py"
  - "api/routes/decoy_token_verify.py"
  - "api/config.py"
  - "ground-truth/manifest.yaml"
  - "**/.env.example"
