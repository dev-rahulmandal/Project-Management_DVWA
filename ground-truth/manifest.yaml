    class: BOLA
    cwe: CWE-639
    owasp: "API1:2023"
    tier: 1
    origin: api
    endpoint: "GET /api/projects/{id}"
    severity: High
    auth: cross-tenant
    detector: diver_idor_bac
    gating: VF_HARDENED
    deterministic: true
    secured_twin: API-BOLA-001-SAFE
    intentional: true
    repro: |
      # alice (org 1) reads a Globex (org 2) project via a sequential id.
      # Token comes from the real web login flow (cookie -> Bearer exchange):
      curl http://localhost:8081/api/projects/4 -H "Authorization: Bearer <alice_token>"
      # -> 200 with project 4 (orgId=2) - not alice's org.

