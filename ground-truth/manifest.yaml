# =============================================================================
# VulnForge ground-truth manifest - THE ANSWER KEY.
#
# Law 1: No vuln without a manifest entry; no manifest entry without a working
#        vuln. App code + this file are one unit; they land together.
# Law 2: Every intentional vuln has an exploit test (it FIRES); every secured
#        twin has a control test (it HOLDS). `python tools/verify.py` enforces both.
#
# Schema: ground-truth/manifest.schema.json (validated by verify.py).
#
# tier: 1 = must-catch-today (the real validation scorecard)
#       2 = aspirational-modern (coverage roadmap; scanner may not find it yet)
# =============================================================================
