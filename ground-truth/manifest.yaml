    tier: 1
    origin: web
    endpoint: "GET /projects/{id}"   # sink: project-detail renders task body via dangerouslySetInnerHTML
    severity: High
    auth: user
    detector: diver_xss_stored
    verification: manual   # browser-tier vuln - verified by hand in a browser (no headless test)
    deterministic: true
    secured_twin: WEB-XSS-001-SAFE
    intentional: true
    repro: |
      # Store a payload in a task body (any authenticated org member), then open
      # the project - the body is injected as raw HTML and executes for every
      # org member who views it. Browser test (Playwright), not curl, proves it.
      #   1. POST /api/projects/{id}/tasks  body={"title":"x","body":"<img src=x onerror=\"document.title='XSS_FIRED'\">"}
      #   2. open http://localhost:8082/projects/{id}  -> document.title becomes "XSS_FIRED"

