  - id: WEB-SECRET-001
    title: Secret API key hardcoded in client code ships in the JS bundle
    class: SecretsInBundle
    cwe: CWE-615
    owasp: "A02:2021"
    tier: 1
    origin: web
    endpoint: "GET /pricing"
    severity: High
    auth: none
    detector: diver_secrets_in_bundle
    verification: manual
    deterministic: true
    secured_twin: WEB-SECRET-001-SAFE
    intentional: true
    repro: |
      # The secret is embedded in a 'use client' module, so it ships to the browser.
      # Load /pricing, then grep the served JS chunk(s):
      curl -s http://localhost:8082/pricing | grep -o '/_next/[^"]*\.js' | \
        while read u; do curl -s "http://localhost:8082$u"; done | grep VULNFORGE_FAKE
      # -> sk_live_VULNFORGE_FAKE_9f3a1c7b_DO_NOT_USE (secret recovered from the bundle)

